<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <h2 class="logo">Community Aid Bridge</h2>
</nav>

<section class="form-section">

<h1>NGO Registration</h1>

<form id="ngoForm">

<input type="text"
placeholder="NGO Name"
required>

<input type="email"
placeholder="Email"
required>

<input type="tel"
placeholder="Contact Number"
required>

<input type="text"
placeholder="City"
required>

<select required>

<option value="">Select Help Needed</option>

<option>Volunteers</option>

<option>Food</option>

<option>Books</option>

<option>Clothes</option>

<option>Funds</option>

<option>Medical Supplies</option>

</select>

<textarea
rows="5"
placeholder="Describe Your Requirement"
required></textarea>

<button type="submit">
Submit
</button>

</form>

</section>

<script src="js/script.js"></script>

</body>
</html>
