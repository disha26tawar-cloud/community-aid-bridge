<h2>Donor Registration</h2>

<form id="donorForm">
    <input type="text" id="donorName" placeholder="Full Name" required>

    <input type="email" id="donorEmail" placeholder="Email" required>

    <input type="text" id="donationType" placeholder="Donation Type (Food, Clothes, Books)" required>

    <input type="number" id="quantity" placeholder="Quantity" required>

    <textarea id="message" placeholder="Additional Details"></textarea>

    <button type="submit">Donate</button>
</form>

<p id="donorSuccess"></p>
